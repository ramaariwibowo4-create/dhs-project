<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHS v1.0 • Dashboard KFG Handheld Premium</title>
    <script src="https://dhs-paragoncorp.up.railway.app/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-body: #0b0f19; --bg-card: #131c2e; --border: #1e293b;
            --text-main: #f8fafc; --text-sub: #64748b; --popup-bg: #131c2e;
            --nav-bg: #1e293b; --sidebar-bg: #0f172a;
        }
        [data-theme="light"] {
            --bg-body: #f4f6f9; --bg-card: #ffffff; --border: #e2e8f0;
            --text-main: #0f172a; --text-sub: #94a3b8; --popup-bg: #ffffff;
            --nav-bg: #ffffff; --sidebar-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 15px 15px 75px 15px; display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; box-sizing: border-box; }
        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 20px; }
        
        .header { padding: 10px 5px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; }
        .menu-toggle-btn { background: none; border: none; color: var(--text-main); font-size: 26px; cursor: pointer; padding: 0; }
        .header h2 { margin: 0; font-size: 20px; color: #38bdf8; font-weight: 900; }
        
        /* ☰ SIDEBAR CONTROL PANEL */
        .sidebar-drawer { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); box-shadow: 20px 0 50px rgba(0,0,0,0.3); z-index: 999; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-drawer.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 998; display: none; }
        .sidebar-overlay.show { display: block; }
        
        .sidebar-header { font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 25px; }
        .sidebar-menu-item { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 14px; border-radius: 12px; font-weight: 700; font-size: 13px; text-align: left; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; width: 100%; box-sizing: border-box; }
        .btn-danger-item { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); color: #ef4444; }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; gap: 20px; }

        .section-title { font-size: 13px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin: 10px 0 4px 0; display: flex; justify-content: space-between; }
        .list-box { display: flex; flex-direction: column; gap: 12px; }
        
        /* CARD TUGAS AKTIF */
        .action-card { background: var(--bg-card); border-radius: 16px; padding: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-left { display: flex; align-items: center; gap: 15px; }
        
        /* 📦 SVG CONTAINER UNTUK KARTU TABLET */
        .mini-img-icon { width: 45px; height: 45px; background: rgba(15, 23, 42, 0.4); border-radius: 10px; padding: 8px; box-sizing: border-box; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .mini-img-icon svg { width: 100%; height: 100%; fill: currentColor; }
        
        .card-left h4 { margin: 0; font-size: 18px; font-weight: 800; }
        .media-lbl { font-size: 12px; color: var(--text-sub); margin: 3px 0 0 0; font-weight: 700; }
        
        .btn-action { color: white; border: none; padding: 10px 16px; font-weight: 800; font-size: 12px; border-radius: 8px; cursor: pointer; }
        .btn-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .btn-green { background: linear-gradient(135deg, #10b981, #059669); }
        .lbl-status-delivered { font-size: 11px; font-weight: 800; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 6px 12px; border-radius: 8px; }
        .empty { text-align: center; color: var(--text-sub); padding: 35px 20px; font-weight: 700; font-size: 13px; border: 2px dashed var(--border); border-radius: 14px; }

        .history-card { background: var(--bg-card); border-radius: 14px; padding: 15px; border: 1px solid var(--border); border-left: 5px solid #10b981; display: flex; justify-content: space-between; align-items: center; }
        
        .nav-bottom { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 440px; background: var(--nav-bg); border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; padding: 10px 0; z-index: 99; }
        .nav-btn { background: none; border: none; color: var(--text-sub); font-weight: 800; font-size: 13px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: #38bdf8; }

        /* ✨ GLOWING POP-UP GLASSMORPHISM UNTUK LAYAR TABLET */
        .overlay-popup { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(2, 6, 23, 0.85); backdrop-filter: blur(15px); z-index: 999; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .overlay-popup.show { opacity: 1; pointer-events: auto; }
        
        .popup-box { position: relative; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 2px solid rgba(59, 130, 246, 0.4); box-shadow: 0 0 40px rgba(59, 130, 246, 0.2), inset 0 1px 1px rgba(255,255,255,0.1); border-radius: 28px; padding: 40px 24px; width: 85%; max-width: 350px; text-align: center; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .overlay-popup.show .popup-box { transform: scale(1); }
        .popup-fg { border-color: rgba(245, 158, 11, 0.5) !important; box-shadow: 0 0 40px rgba(245, 158, 11, 0.2), inset 0 1px 1px rgba(255,255,255,0.1) !important; }
        
        .btn-close-popup { position: absolute; top: 12px; right: 18px; font-size: 30px; color: #64748b; cursor: pointer; background: none; border: none; font-weight: 300; line-height: 1; }
        .btn-close-popup:hover { color: #ef4444; }
        
        .popup-icon-wrapper { width: 80px; height: 80px; margin: 0 auto 15px auto; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 18px; box-sizing: border-box; color: #3b82f6; }
        .popup-fg .popup-icon-wrapper { color: #f59e0b; }
        .popup-icon-wrapper svg { width: 100%; height: 100%; fill: currentColor; }

        .popup-badge-label { display: inline-block; font-size: 10px; font-weight: 900; background: rgba(59, 130, 246, 0.15); color: #38bdf8; padding: 4px 12px; border-radius: 99px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
        .popup-fg .popup-badge-label { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .btn-popup-action { width: 100%; color: white; border: none; padding: 14px; font-weight: 800; font-size: 14px; border-radius: 12px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="tutupSidebar()"></div>
<div class="sidebar-drawer" id="sidebarDrawer">
    <div class="sidebar-header">⚙️ DHS Control Panel</div>
    <button class="sidebar-menu-item" onclick="toggleTheme()"><span id="sidebarThemeText">🌓 Switch Light Mode</span></button>
    <button class="sidebar-menu-item btn-danger-item" onclick="clearDataMonitor()">🧹 Clear Data Monitor</button>
    <div style="flex-grow:1;"></div>
    <button class="sidebar-menu-item btn-danger-item" style="background:#ef4444; color:white; border:none;" onclick="logoutSistem()"><span>🚪</span> Log Out Platform</button>
</div>

<!-- ✨ PREMIUM POP-UP DISPLAY TABLET DENGAN TOMBOL SILANG -->
<div id="popupOverlay" class="overlay-popup">
    <div class="popup-box" id="pBox">
        <button class="btn-close-popup" onclick="tutupPopupManual()">×</button>
        <div class="popup-icon-wrapper" id="popIconContainer">
            <!-- Diisi dinamis via JS -->
        </div>
        <div id="pLabel" class="popup-badge-label">TUGAS MASUK</div>
        <h2 id="popFloorLine" style="font-size: 38px; font-weight: 900; margin: 5px 0; letter-spacing: -0.5px;">LINE --</h2>
        <div id="popFloorText" style="font-size: 14px; font-weight: 700; color: #38bdf8; margin-bottom: 10px;">Lantai --</div>
        <div id="popMedia" style="font-size: 18px; font-weight: 800; color: var(--text-main); margin-bottom: 5px; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 10px;">TROLI BESAR</div>
        <button class="btn-popup-action" id="popBtnSubmit">EKSEKUSI TUGAS</button>
    </div>
</div>

<div class="container">
    <div class="header"><button class="menu-toggle-btn" onclick="bukaSidebar()">☰</button><h2>DHS • DASHBOARD KFG</h2></div>
    
    <div id="pageTugas" class="tab-content active">
        <div>
            <div class="section-title"><span>📦 PASOKAN TROLI (INBOUND)</span><span id="badgeCountTroli" style="color:#3b82f6; font-weight:900;">0</span></div>
            <div class="list-box" id="listTroli"><div class="empty">🟢 Bersih, tidak ada request pasokan troli.</div></div>
        </div>
        <div>
            <div class="section-title" style="color: #f59e0b;"><span>🚨 TARIK FG FULL (OUTBOUND)</span><span id="badgeCountFG" style="color:#f59e0b; font-weight:900;">0</span></div>
            <div class="list-box" id="listFG"><div class="empty">🟢 Bersih, tidak ada palet FG siap tarik.</div></div>
        </div>
    </div>

    <div id="pageRiwayat" class="tab-content">
        <div class="section-title">📜 DATA LOG RIWAYAT SELESAI HARI INI</div>
        <div class="list-box" id="listRiwayat"><div class="empty">Belum ada riwayat tugas diselesaikan.</div></div>
    </div>
</div>

<div class="nav-bottom">
    <button class="nav-btn active" id="btnTabTugas" onclick="bukaTab('tugas')">📋 Tugas Aktif</button>
    <button class="nav-btn" id="btnTabRiwayat" onclick="bukaTab('riwayat')">📜 Riwayat Kerja</button>
</div>

<script>
    const socket = io('https://dhs-paragoncorp.up.railway.app');
    let activePopupId = null;

    // ✨ SVG ASSET MANDIRI ANTI-ES KRIM 🍦
    const svgIcons = {
        box: `<svg viewBox="0 0 24 24"><path d="M12 21.35l-8-4.63V7.28l8 4.63v9.44zm1-9.44l8-4.63v9.44l-8 4.63v-9.44zM12 2.65l7.65 4.42L12 11.49 4.35 7.07 12 2.65z"/></svg>`,
        trolley: `<svg viewBox="0 0 24 24"><path d="M19 16c.55 0 1-.45 1-1V5c0-.55-.45-1-1-1H7c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12zM6 20c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm12 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>`
    };

    function bukaSidebar() { document.getElementById('sidebarDrawer').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
    function tutupSidebar() { document.getElementById('sidebarDrawer').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const targetTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', targetTheme);
        document.getElementById('sidebarThemeText').innerText = targetTheme === 'light' ? '🌙 Switch Dark Mode' : '☀️ Switch Light Mode';
        tutupSidebar();
    }
    function logoutSistem() { localStorage.clear(); window.location.href = 'login.html'; }
    function clearDataMonitor() {
        tutupSidebar();
        if(confirm("Apakah Anda yakin ingin RESET ALL?")) fetch('https://dhs-paragoncorp.up.railway.app/api/request/reset-all', { method: 'POST' });
    }
    function bukaTab(target) {
        document.getElementById('pageTugas').classList.remove('active'); document.getElementById('pageRiwayat').classList.remove('active');
        document.getElementById('btnTabTugas').classList.remove('active'); document.getElementById('btnTabRiwayat').classList.remove('active');
        if(target === 'tugas') { document.getElementById('pageTugas').classList.add('active'); document.getElementById('btnTabTugas').classList.add('active'); } 
        else { document.getElementById('pageRiwayat').classList.add('active'); document.getElementById('btnTabRiwayat').classList.add('active'); }
    }
    function tutupPopupManual() { document.getElementById('popupOverlay').classList.remove('show'); activePopupId = null; }

    function getMediaVisual(jenis) {
        if(jenis === 'TROLI_BESAR') return { svg: svgIcons.trolley, text: 'TROLI BESAR', colorClass: 'text-blue-highlight' };
        if(jenis === 'TROLI_KECIL') return { svg: svgIcons.trolley, text: 'TROLI KECIL', colorClass: 'text-green-highlight' };
        return { svg: svgIcons.box, text: 'TARIK FG FULL', colorClass: 'text-orange-highlight' };
    }

    function kirimTroliKeLift(id) { tutupPopupManual(); fetch('https://dhs-paragoncorp.up.railway.app/api/request/kirim-troli', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) }); }
    function selesaikanTugas(id) { tutupPopupManual(); fetch('https://dhs-paragoncorp.up.railway.app/api/request/selesai', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: id }) }); }

    socket.on('ANTREAN_BARU_MASUK', (data) => {
        activePopupId = data.id; const pb = document.getElementById('pBox'); const btn = document.getElementById('popBtnSubmit');
        const visual = getMediaVisual(data.jenisMedia);
        
        document.getElementById('popIconContainer').innerHTML = visual.svg;
        document.getElementById('popFloorLine').innerText = data.line;
        document.getElementById('popFloorText').innerText = `Zona Operasional: Lantai ${data.lantai}`;
        document.getElementById('popFloorText').style.color = data.lantai == 2 ? '#a855f7' : '#38bdf8';
        document.getElementById('popMedia').innerText = visual.text;

        if(data.jenisMedia === 'FG_FULL') {
            pb.className = "popup-box popup-fg"; document.getElementById('pLabel').innerText = "🚨 TARGET TARIK FG READY!";
            btn.className = "btn-popup-action btn-green"; btn.innerText = "✓ SELESAI TARIK SEKARANG"; btn.setAttribute('onclick', `selesaikanTugas('${data.id}')`);
        } else {
            pb.className = "popup-box"; document.getElementById('pLabel').innerText = "📦 REQUEST PASOKAN TROLI!";
            btn.className = "btn-popup-action btn-blue"; btn.innerText = "🛫 KIRIM KE LIFT"; btn.setAttribute('onclick', `kirimTroliKeLift('${data.id}')`);
        }
        document.getElementById('popupOverlay').classList.add('show');
    });

    socket.on('DATA_ANTREAN_UPDATE', (data) => {
        const boxTroli = document.getElementById('listTroli'); const boxFG = document.getElementById('listFG');
        document.getElementById('badgeCountTroli').innerText = data.troli.length; document.getElementById('badgeCountFG').innerText = data.fg.length;

        boxTroli.innerHTML = data.troli.length === 0 ? `<div class="empty">🟢 Bersih, tidak ada request pasokan troli.</div>` : '';
        data.troli.forEach(item => {
            const visual = getMediaVisual(item.jenisMedia);
            const div = document.createElement('div'); div.className = 'action-card';
            let htmlKanan = item.status === 'DELIVERED' ? `<span class="lbl-status-delivered">DI LIFT 🛫</span>` : `<button class="btn-action btn-blue" onclick="kirimTroliKeLift('${item.id}')">KIRIM KE LIFT</button>`;
            div.innerHTML = `<div class="card-left"><div class="mini-img-icon" style="color:#3b82f6;">${visual.svg}</div><div><h4>${item.line} <span style="font-size:11px; color:#38bdf8;">(Lant. ${item.lantai})</span></h4><p class="media-lbl">${visual.text}</p></div></div><div>${htmlKanan}</div>`;
            boxTroli.appendChild(div);
        });

        boxFG.innerHTML = data.fg.length === 0 ? `<div class="empty">🟢 Bersih, tidak ada palet FG siap tarik.</div>` : '';
        data.fg.forEach(item => {
            const visual = getMediaVisual(item.jenisMedia);
            const div = document.createElement('div'); div.className = 'action-card';
            div.innerHTML = `<div class="card-left"><div class="mini-img-icon" style="color:#f59e0b;">${visual.svg}</div><div><h4>${item.line} <span style="font-size:11px; color:#f59e0b;">(Lant. ${item.lantai})</span></h4><p class="media-lbl">${visual.text}</p></div></div><button class="btn-action btn-green" onclick="selesaikanTugas('${item.id}')">SELESAI TARIK</button>`;
            boxFG.appendChild(div);
        });
    });

    let popupTimeout = null; // Menyimpan ID timer pop-up aktif

    socket.on('ANTREAN_BARU_MASUK', (data) => {
        activePopupId = data.id; 
        const pb = document.getElementById('pBox'); 
        const btn = document.getElementById('popBtnSubmit');
        const visual = getMediaVisual(data.jenisMedia);
        
        document.getElementById('popIconContainer').innerHTML = visual.svg;
        document.getElementById('popFloorLine').innerText = data.line;
        document.getElementById('popFloorText').innerText = `Zona Operasional: Lantai ${data.lantai}`;
        document.getElementById('popFloorText').style.color = data.lantai == 2 ? '#a855f7' : '#38bdf8';
        document.getElementById('popMedia').innerText = visual.text;

        if(data.jenisMedia === 'FG_FULL') {
            pb.className = "popup-box popup-fg"; document.getElementById('pLabel').innerText = "🚨 TARGET TARIK FG READY!";
            btn.className = "btn-popup-action btn-green"; btn.innerText = "✓ SELESAI TARIK SEKARANG"; btn.setAttribute('onclick', `selesaikanTugas('${data.id}')`);
        } else {
            pb.className = "popup-box"; document.getElementById('pLabel').innerText = "📦 REQUEST PASOKAN TROLI!";
            btn.className = "btn-popup-action btn-blue"; btn.innerText = "🛫 KIRIM KE LIFT"; btn.setAttribute('onclick', `kirimTroliKeLift('${data.id}')`);
        }
        
        document.getElementById('popupOverlay').classList.add('show');

        // ⏳ TIMER PINTAR 30 DETIK: Otomatis close jika didiamkan operator tablet
        if (popupTimeout) clearTimeout(popupTimeout);
        popupTimeout = setTimeout(() => {
            tutupPopupManual();
            console.log("⏱️ Pop-up Tablet otomatis ditutup setelah 30 detik idle.");
        }, 30000);
    });

    // Pastikan fungsi tutup manual di tablet juga menghapus detikan antrean
    function tutupPopupManual() { 
        document.getElementById('popupOverlay').classList.remove('show'); 
        activePopupId = null; 
        if (popupTimeout) { clearTimeout(popupTimeout); popupTimeout = null; }
    }
</script>
</body>
</html>
