<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHS v1.0 • Operator Packaging Line</title>
    <style>
        :root {
            --bg-body: #f4f6f9; --bg-card: #ffffff; --border: #cbd5e1;
            --text-main: #0f172a; --text-sub: #64748b; --sidebar-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg-body: #0b0f19; --bg-card: #131c2e; --border: #1e293b;
            --text-main: #f8fafc; --text-sub: #94a3b8; --sidebar-bg: #0f172a;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; transition: 0.3s; box-sizing: border-box; }
        .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 24px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .menu-toggle-btn { background: none; border: none; color: var(--text-main); font-size: 26px; cursor: pointer; padding: 0; }
        .header h1 { margin: 0; font-size: 28px; font-weight: 900; color: #1e3a8a; }
        [data-theme="dark"] .header h1 { color: #ffffff; }
        .header p { margin: 3px 0 0 0; font-size: 13px; color: var(--text-sub); font-weight: 600; }
        
        .status-area { text-align: right; }
        .line-badge { font-size: 20px; font-weight: 900; color: #2563eb; margin: 0; }
        .online-dot { font-size: 12px; color: #10b981; font-weight: 700; margin: 4px 0 0 0; }

        .sidebar-drawer { position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); box-shadow: 20px 0 50px rgba(0,0,0,0.3); z-index: 999; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-drawer.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 998; display: none; }
        .sidebar-overlay.show { display: block; }
        .sidebar-header { font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 25px; }
        .sidebar-menu-item { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 14px; border-radius: 12px; font-weight: 700; font-size: 13px; text-align: left; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; width: 100%; box-sizing: border-box; }
        .sidebar-menu-item:active { transform: scale(0.98); }

        .section-title { font-size: 16px; font-weight: 800; text-align: center; margin: 0; }
        .section-sub { font-size: 13px; color: var(--text-sub); text-align: center; margin: -15px 0 5px 0; font-weight: 600; }
        .grid-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        
        .select-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: 16px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .select-card svg { width: 40px; height: 40px; fill: currentColor; }
        .select-card span { font-size: 12px; font-weight: 800; }
        
        .card-blue { color: #2563eb; border-color: rgba(37, 99, 235, 0.2); }
        .card-blue:hover { background: rgba(37, 99, 235, 0.05); border-color: #2563eb; }
        .card-green { color: #10b981; border-color: rgba(16, 185, 129, 0.2); }
        .card-green:hover { background: rgba(16, 185, 129, 0.05); border-color: #10b981; }
        .card-orange { color: #d97706; border-color: rgba(217, 119, 6, 0.2); }
        .card-orange:hover { background: rgba(217, 119, 6, 0.05); border-color: #d97706; }

        .status-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .status-title { font-size: 14px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        .empty-log { font-size: 13px; color: var(--text-sub); font-weight: 600; text-align: center; padding: 15px 0; }
        
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .log-item:last-child { border-bottom: none; padding-bottom: 0; }
        .log-left { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; }
        .log-left svg { width: 18px; height: 18px; fill: currentColor; }
        
        .log-right-action { display: flex; align-items: center; gap: 8px; }
        .badge-status { font-size: 10px; font-weight: 800; padding: 5px 9px; border-radius: 6px; text-transform: uppercase; }
        .status-wait { background: rgba(217, 119, 6, 0.1); color: #d97706; }
        .status-deliv { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        .status-done { background: rgba(100, 116, 139, 0.1); color: var(--text-sub); }
        
        .btn-confirm-terima { 
            background: #10b981; 
            color: white; 
            border: none; 
            font-size: 11px; 
            font-weight: 800; 
            padding: 6px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
            box-shadow: 0 2px 6px rgba(16, 185, 129, 0.3);
            transition: 0.2s; 
        }
        .btn-confirm-terima:hover { background: #059669; }
        .btn-confirm-terima svg { width: 12px; height: 12px; fill: white; }

        /* Tombol Instan khusus Lantai 1 */
        .btn-instan-lnt1 { 
            background: #64748b; 
            color: white; 
            border: none; 
            font-size: 11px; 
            font-weight: 800; 
            padding: 6px 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .btn-instan-lnt1:hover { background: #475569; }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="tutupSidebar()"></div>
<div class="sidebar-drawer" id="sidebarDrawer">
    <div class="sidebar-header">⚙️ DHS Operator Menu</div>
    <button class="sidebar-menu-item" onclick="toggleTheme()">🌓 Switch Light Mode</button>
    <div style="flex-grow:1;"></div>
    <button class="sidebar-menu-item" style="background:#ef4444; color:white; border:none;" onclick="logoutSistem()">
        <span>🚪</span> Log Out Platform
    </button>
</div>

<div class="container">
    <div class="header">
        <div class="header-left">
            <button class="menu-toggle-btn" onclick="bukaSidebar()">☰</button>
            <div>
                <h1>DHS</h1>
                <p>Digital Handling System</p>
            </div>
        </div>
        <div class="status-area">
            <h3 class="line-badge" id="lblLineName">LINE --</h3>
            <p class="online-dot" id="lblLantaiName">Lantai - • Online</p>
        </div>
    </div>

    <div style="display:flex; flex-direction:column; gap:15px;">
        <h4 class="section-title">Buat Request Baru</h4>
        <p class="section-sub">Pilih media penunjang line</p>
        <div class="grid-selector">
            <div class="select-card card-blue" onclick="kirimRequest('TROLI_BESAR')"><div id="iconTroliBesar"></div><span>Troli Besar</span></div>
            <div class="select-card card-green" onclick="kirimRequest('TROLI_KECIL')"><div id="iconTroliKecil"></div><span>Troli Kecil</span></div>
            <div class="select-card card-orange" onclick="kirimRequest('FG_FULL')"><div id="iconFgFull"></div><span>Tarik FG Full</span></div>
        </div>
    </div>

    <div class="status-box">
        <div class="status-title" id="lblStatusTitleText">Request Aktif Line Ini</div>
        <div id="boxRequestAktif"><div class="empty-log">🟢 Jalur Aman. Tidak ada request menggantung.</div></div>
    </div>

    <div class="status-box">
        <div class="status-title">Riwayat Aktivitas Terakhir</div>
        <div id="boxRiwayatLokal"><div class="empty-log">Belum ada aktivitas terekam hari ini.</div></div>
    </div>
</div>

<script>
    const sessionUser = JSON.parse(localStorage.getItem('dhs_user'));
    if (!sessionUser) { window.location.href = 'login.html'; }

    document.getElementById('lblLineName').innerText = sessionUser.line;
    document.getElementById('lblLantaiName').innerText = `Lantai ${sessionUser.lantai} • Online`;

    if(sessionUser.lantai == 1) {
        document.getElementById('lblStatusTitleText').innerText = 'Request Aktif (Lantai 1 • Klik Bebas Selesai)';
    } else {
        document.getElementById('lblStatusTitleText').innerText = 'Request Aktif (Klik "Confirm Terima" Di Lift)';
    }

    let adakahTroliAktif = false;

    const icons = {
        trolley: `<svg viewBox="0 0 24 24"><path d="M19 16c.55 0 1-.45 1-1V5c0-.55-.45-1-1-1H7c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12zM6 20c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm12 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>`,
        box: `<svg viewBox="0 0 24 24"><path d="M12 21.35l-8-4.63V7.28l8 4.63v9.44zm1-9.44l8-4.63v9.44l-8 4.63v-9.44zM12 2.65l7.65 4.42L12 11.49 4.35 7.07 12 2.65z"/></svg>`,
        check: `<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>`
    };
    document.getElementById('iconTroliBesar').innerHTML = icons.trolley;
    document.getElementById('iconTroliKecil').innerHTML = icons.trolley;
    document.getElementById('iconFgFull').innerHTML = icons.box;

    function bukaSidebar() { document.getElementById('sidebarDrawer').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
    function tutupSidebar() { document.getElementById('sidebarDrawer').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', targetTheme);
        tutupSidebar();
    }
    function logoutSistem() { localStorage.clear(); window.location.href = 'login.html'; }

    function kirimRequest(jenis) {
        if ((jenis === 'TROLI_BESAR' || jenis === 'TROLI_KECIL') && adakahTroliAktif) {
            alert("❌ Request Ditolak! Masih ada antrean TROLI yang aktif / berjalan.");
            return;
        }
        fetch('https://dhs-paragoncorp.up.railway.app/api/request/baru', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ line: sessionUser.line, lantai: sessionUser.lantai, jenisMedia: jenis })
        }).catch(err => alert("Gagal memanggil bantuan logistik."));
    }

    window.eksekusiTerimaFisik = function(id, textLabel) {
        fetch('https://dhs-paragoncorp.up.railway.app/api/request/selesai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(res => res.json())
        .then(resData => {
            if(resData.success) {
                tambahKeRiwayatLokal({ jenisMedia: textLabel.toUpperCase().replace(' ', '_') });
            }
        }).catch(() => {});
    }

    function getMediaLabel(jenis) {
        if(jenis === 'TROLI_BESAR') return { text: 'Troli Besar', icon: icons.trolley };
        if(jenis === 'TROLI_KECIL') return { text: 'Troli Kecil', icon: icons.trolley };
        return { text: 'Tarik FG Full', icon: icons.box };
    }

    function tambahKeRiwayatLokal(item) {
        let riwayat = JSON.parse(localStorage.getItem(`dhs_log_${sessionUser.username}`)) || [];
        riwayat.unshift(item);
        if(riwayat.length > 5) riwayat.pop();
        localStorage.setItem(`dhs_log_${sessionUser.username}`, JSON.stringify(riwayat));
        renderRiwayatLokal();
    }

    function renderRiwayatLokal() {
        const box = document.getElementById('boxRiwayatLokal');
        const riwayat = JSON.parse(localStorage.getItem(`dhs_log_${sessionUser.username}`)) || [];
        if(riwayat.length === 0) return;
        box.innerHTML = '';
        riwayat.forEach(item => {
            const media = getMediaLabel(item.jenisMedia);
            box.innerHTML += `<div class="log-item"><div class="log-left">${media.icon} <span>${media.text}</span></div><span class="badge-status status-done">COMPLETED</span></div>`;
        });
    }

    setInterval(() => { fetch('https://dhs-paragoncorp.up.railway.app/api/request/baru', { method: 'GET' }).catch(() => {}); }, 5000);

    const scriptIo = document.createElement('script');
    scriptIo.src = "https://dhs-paragoncorp.up.railway.app/socket.io/socket.io.js";
    scriptIo.onload = () => {
        const socket = io('https://dhs-paragoncorp.up.railway.app');
        
        socket.on('DATA_ANTREAN_UPDATE', (data) => {
            const boxAktif = document.getElementById('boxRequestAktif');
            const gabung = [...data.troli, ...data.fg];
            const filtered = gabung.filter(item => item.line === sessionUser.line);
            
            adakahTroliAktif = filtered.some(item => item.jenisMedia === 'TROLI_BESAR' || item.jenisMedia === 'TROLI_KECIL');
            
            if(filtered.length === 0) {
                boxAktif.innerHTML = `<div class="empty-log">🟢 Jalur Aman. Tidak ada request menggantung.</div>`;
                return;
            }
            
            boxAktif.innerHTML = '';
            filtered.forEach(item => {
                const media = getMediaLabel(item.jenisMedia);
                let badgeClass = 'status-wait';
                let txtStatus = 'WAITING';
                let tombolHtml = '';

                if(item.status === 'DELIVERED') { badgeClass = 'status-deliv'; txtStatus = 'DI LIFT'; }

                // 🔥 LOGIKA BARU LANTAI 1 BISA SELESAI INSTAN KAPAN SAJA
                if (sessionUser.lantai == 1) {
                    tombolHtml = `<button class="btn-instan-lnt1" onclick="window.eksekusiTerimaFisik('${item.id}', '${media.text}')">✓ Selesai</button>`;
                } else {
                    // Lantai 2: Tombol hijau baru muncul pas statusnya DI LIFT
                    if(item.status === 'DELIVERED') { 
                        tombolHtml = `<button class="btn-confirm-terima" onclick="window.eksekusiTerimaFisik('${item.id}', '${media.text}')">${icons.check} Confirm Terima</button>`;
                    }
                }
                
                if(item.jenisMedia === 'FG_FULL') {
                tombolHtml = `<button class="btn-confirm-terima" onclick="window.eksekusiTerimaFisik('${item.id}', '${media.text}')">${icons.check} Confirm Terima</button>`;
                // Jika masih menunggu, tampilkan label WAIT KFG
                if(item.status === 'WAITING') { txtStatus = 'WAIT KFG'; }
            }
                boxAktif.innerHTML += `
                    <div class="log-item">
                        <div class="log-left">${media.icon} <span>${media.text}</span></div>
                        <div class="log-right-action">
                            <span class="badge-status ${badgeClass}">${txtStatus}</span>
                            ${tombolHtml}
                        </div>
                    </div>`;
            });
        });

        socket.on('FORCE_RESET_SCREEN', () => {
            adakahTroliAktif = false;
            document.getElementById('boxRequestAktif').innerHTML = `<div class="empty-log">🟢 Jalur Aman. Tidak ada request menggantung.</div>`;
        });
    };
    document.head.appendChild(scriptIo);
    renderRiwayatLokal();
</script>
</body>
</html>
